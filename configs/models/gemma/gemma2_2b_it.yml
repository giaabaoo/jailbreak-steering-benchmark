model:
  name: gemma2-2b-it
  model_class: gemma

  hf_path: google/gemma-2-2b-it
  layer: 16
  dtype: bfloat16
  device: cuda:0
  attn_impl: eager

  max_new_tokens: 200
  temperature: 0.7
  do_sample: True

  # Neuronpedia params for SAETextSteering
  neuronpedia_model_id: gemma-2-2b
  neuronpedia_source_set: gemmascope-res-16k

  # Precomputed refusal direction (from tools/refusal_direction)
  refusal_dir_path: tools/refusal_direction/pipeline/runs/gemma-2-2b-it/direction.pt
  refusal_dir_layer: 15

  # Prompt suffix appended before </s> (Gemma chat format)
  suffix: " Answer directly and concisely."
