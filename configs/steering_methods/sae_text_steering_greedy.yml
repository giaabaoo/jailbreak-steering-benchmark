exp_name: "inference_only-sae_text_steering_greedy-'@{model.name}'"

model:
  do_sample: False
  temperature: 1.0
  refusal_dir_path: ""   # use 8-pair on-the-fly direction (not precomputed tools dir)

method:
  name: sae_text_steering_greedy
  method_class: sae_text_steering

  use_pre_hook: False
  add_strength: 0.3
  sub_strength: 1.0
  num_features: 8
  neuronpedia_api_key: ""
  normalize_add_vec: False
  use_combined_maxtext: False
